# Copy this file to configs/run_config.local.toml and edit the paths for the
# machine where you are running the pipeline.

[input]
# Directory containing the HDF5 turbulence files for this dataset.
h5_dir = "/home/user0001/MHDFlows_replicate/multiphase_mode_decomposition/outputs/MP_WeakB_0_5tcs_cs1_L200/mode_h5"

# User-facing labels. These are used in output paths:
# outputs/campaigns_cache/<cache_mode>/<medium>/<label>/<mode>/<energy>_GeV/
label = "0_5"
medium = "mp"  # "iso" for isothermal, "mp" for multiphase.

# File naming. With mode_decomposition_available=true, files default to
# <file_stem>_alfven.h5, <file_stem>_fast.h5, and <file_stem>_slow.h5.
file_stem = "MP_WeakB_0_5tcs"
total_file = "MP_WeakB_0_5tcs.h5"

# The total field is required and is always used for the shared reference clock.
# If mode decomposition is enabled, mode files are searched in the same directory.
mode_decomposition_available = true
available_modes = ["alfven", "fast", "slow"]
mode_file_pattern = "{stem}_{mode}.h5"

[time_reference]
mode = "total-field-mean-magnitude"

[output]
root = "outputs/campaigns_cache"

[run]
# Core output/cache choice.
# "phase-space" records positions and momenta. "mu" records pitch angle only and
# is smaller when the only downstream product is D_mumu.
cache_mode = "mu"

# Set false to skip D_mumu and delta_mu2 outputs. If compute_dpp is also false,
# the run stops after trajectory/cache generation.
compute_dmumu = true

# Compute global D_pp and energy-distribution snapshots. This requires the
# phase-space cache; the runner switches cache_mode to "phase-space" when true.
# D_pp writes dpp_full.h5 separately from the D_mumu product.
compute_dpp = false

# Full repeat: every selected energy for every selected mode.
energies_gev = [1e5, 1e6, 1e7]
modes = "all"

# Selective campaign example. Uncomment to run only specific mode/energy pairs.
# If this is present, it replaces the modes/energies full-repeat selection.
# [[run.campaigns]]
# mode = "alfven"
# energies_gev = [1e5]
#
# [[run.campaigns]]
# mode = "fast"
# energies_gev = [1e6, 1e7]

delete_cache_on_success = true
reuse_existing_cache = true
skip_completed_outputs = true
stop_on_error = true
mu_cache_output_precision = "Float32"
smoke = false

[particles]
# Physical trajectory settings.
B_paths = ["i_mag_field", "j_mag_field", "k_mag_field"]
v_paths = ["i_velocity", "j_velocity", "k_velocity"]
velocity_unit_in_m_per_s = 1000.0
box_length_pc = 200.0
# Preferred time controls use reference gyroperiods, T_g0 = 2π / Omega0.
# These values preserve the historical defaults eta = 0.1 and tOmega0_max = 5000.
integration_steps_per_gyroperiod = 62.83185307179586
trajectory_duration_gyroperiods = 795.7747154594767
use_cfl = false
cfl = 0.2
boundary = "periodic"

# Injection controls. Defaults preserve the historical behavior: random position
# and isotropic momentum direction. For fixed mu0, mu is defined relative to the
# local magnetic field at each injection position and gyrophase remains random.
injection_position_mode = "random"  # "random" or "fixed".
injection_position = [0.5, 0.5, 0.5]
injection_position_unit = "box-fraction"  # "box-fraction", "pc", or "m".
injection_mode = "isotropic"  # "isotropic" or "fixed-mu".
injection_mu0 = 0.0

# Ensemble and trajectory-cache burden settings.
seed = 42
n_particles = 100000
precision = "Float32"
field_subset = []
trajectory_save_interval_gyroperiods = 0.015915494309189534
trajectory_output_precision = "Float32"
async_cache_writer = true
cache_writer_buffer_count = 2
progress_every = 5000

[dmumu]
# Particle subset for D_mumu only. "all" uses all cached particles; "sample"
# uses the selection controls below.
particles = "sample"

# Field and backend settings used while reconstructing mu or reading mu cache.
B_paths = ["i_mag_field", "j_mag_field", "k_mag_field"]
box_length_pc = 200.0
field_subset = []
compute_backend = "gpu"
compute_precision = "Float32"
gpu_threads = 256
gpu_lag_batch_size = 4
gpu_memory_fraction = 0.75
gpu_pipeline_buffers = 2

# D_mumu estimator mode.
# "sliding": bin by mu(t), use Delta mu = mu(t + tau) - mu(t) over all valid start times.
# "injection": bin by injected mu(0), use Delta mu = mu(tau) - mu(0) once per particle per lag.
# With mu_bin_abs = true below, these become |mu(t)| and |mu(0)| bins.
dmumu_start_mode = "sliding"

# Particle controls for sampled D_mumu runs.
particle_chunk_size = 128
first_particle = 1
n_particles_to_use = 10000
particle_selection = "block-random"
particle_seed = 20260423
particle_block_size = 128

# Lag grid controls for both D_mumu estimator modes, in reference gyroperiods.
# uniform-samples: use n_lag_samples linearly spaced requested lags from
# lag_min_gyroperiods through lag_max_gyroperiods, then map to cached offsets.
# If lag_max_gyroperiods is omitted, the full cached duration is used.
# stride: use lag_min_gyroperiods, lag_min_gyroperiods + lag_stride_gyroperiods, ...
lag_mode = "uniform-samples"
lag_range_policy = "common-cache-intersection"  # "fixed", "first-cache-step", or "common-cache-intersection".
lag_common_scope = "reference-group"  # "campaign" or "reference-group" for cross-mode comparisons.
lag_boundary_policy = "nearest"  # "strict" preserves exact range rejection; "nearest" allows bounded cache-step snapping.
max_lag_boundary_relative_error = 0.05
lag_min_gyroperiods = 0.015915494309189534
n_lag_samples = 40
lag_max_gyroperiods = 795.7747154594767
lag_stride_gyroperiods = 0.015915494309189534

# D_mumu mu-binning and safety controls. mu_bin_abs bins by abs(mu_start)
# while stored mu values and Delta mu remain signed.
n_mu_bins = 24
mu_bin_abs = true
mu_min = 0.0
mu_max = 1.0
min_count_per_cell = 20
max_pair_visits_without_allow = 5.0e9
allow_huge = true
use_usetex = false

[dpp]
# Global D_pp uses scalar p = sqrt(px^2 + py^2 + pz^2) from the phase-space
# cache. These controls are independent from [dmumu]; [particles] still controls
# the generated physical ensemble and trajectory parameters shared by both.
compute_backend = "gpu"
compute_precision = "Float32"
gpu_threads = 256
gpu_lag_batch_size = 4
gpu_memory_fraction = 0.75
gpu_pipeline_buffers = 2
particle_chunk_size = 128
first_particle = 1
n_particles_to_use = 10000
particle_selection = "block-random"
particle_seed = 20260423
particle_block_size = 128
lag_mode = "uniform-samples"
lag_range_policy = "common-cache-intersection"
lag_common_scope = "reference-group"
lag_boundary_policy = "nearest"
max_lag_boundary_relative_error = 0.05
lag_min_gyroperiods = 0.015915494309189534
n_lag_samples = 40
lag_max_gyroperiods = 795.7747154594767
lag_stride_gyroperiods = 0.015915494309189534
n_energy_snapshots = 5
n_energy_bins = 64
save_raw_energy_snapshots = false
